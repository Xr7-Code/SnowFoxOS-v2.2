; ============================================================
;   SnowFoxOS v2.1 — Polybar Config (SnowFox Palette)
; ============================================================

[colors]
bg      = #1e1e2e
bg-alt  = #252538
fg      = #cdd6f4
fg-dim  = #6c7086
purple  = #8139e8
orange  = #ff79c6
red     = #e05555
green   = #5faf5f

; ============================================================
;   Desktop Bar
; ============================================================
[bar/snowfox]
width = 100%
height = 28
radius = 0
fixed-center = true
background = ${colors.bg}
foreground = ${colors.fg}
line-size = 2
border-size = 0
padding-left = 2
padding-right = 2
module-margin-left = 0
module-margin-right = 0

# Ersetze diesen Block in deiner Polybar-Konfiguration:

font-0 = "JetBrainsMono Nerd Font:size=10;2"
font-1 = "JetBrainsMono Nerd Font Mono:size=11;2"
font-2 = "Noto Color Emoji:scale=8;3"

modules-left   = menu sep workspaces
modules-center = date
modules-right  = memory sep-r network sep-r pulseaudio

wm-restack = i3
override-redirect = false

tray-position    = right
tray-maxsize     = 16
tray-padding     = 4
tray-background = ${colors.bg}

; ============================================================
;   Laptop Bar
; ============================================================
[bar/snowfox-laptop]
inherit = bar/snowfox
modules-right = backlight sep-r battery sep-r memory sep-r network sep-r pulseaudio

; ============================================================
;   Separator Module
; ============================================================
[module/sep]
type = custom/text
content = "  "
content-foreground = ${colors.bg}

[module/sep-r]
type = custom/text
content = "  "
content-foreground = ${colors.bg}

; ============================================================
;   Fuchs Menü
; ============================================================
[module/menu]
type = custom/text
content = %{A1:rofi -show drun -theme ~/.config/rofi/config.rasi:}🦊%{A}
content-font = 3
content-foreground = ${colors.purple}
content-padding = 0

; ============================================================
;   Workspaces
; ============================================================
[module/workspaces]
type = internal/i3
format = <label-state> <label-mode>
index-sort = true
label-mode = %mode%
label-mode-padding = 2
label-mode-foreground = ${colors.orange}
label-focused = %index%
label-focused-foreground = ${colors.fg}
label-focused-underline = ${colors.purple}
label-focused-padding = 1
label-unfocused = %index%
label-unfocused-foreground = ${colors.fg-dim}
label-unfocused-padding = 1
label-urgent = %index%
label-urgent-foreground = ${colors.orange}
label-urgent-padding = 2

; ============================================================
;   Uhr
; ============================================================
[module/date]
type = internal/date
interval = 1
date = %H:%M
date-alt = %H:%M  %a %d.%m.%Y
label = %date%
label-foreground = ${colors.fg}

; ============================================================
;   RAM
; ============================================================
[module/memory]
type = internal/memory
interval = 5
format = <label>
format-prefix = "RAM "
format-prefix-foreground = ${colors.purple}
label = %percentage_used%%
label-foreground = ${colors.fg-dim}

; ============================================================
;   Netzwerk
; ============================================================
[module/network]
type = internal/network
interface-type = wireless
interval = 3
format-connected = <label-connected>
format-connected-prefix = "NET "
format-connected-prefix-foreground = ${colors.purple}
label-connected = %essid%
label-connected-foreground = ${colors.fg-dim}
format-disconnected = <label-disconnected>
format-disconnected-prefix = "NET "
format-disconnected-prefix-foreground = ${colors.fg-dim}
label-disconnected = "aus"
label-disconnected-foreground = ${colors.fg-dim}

; ============================================================
;   Lautstärke
; ============================================================
[module/pulseaudio]
type = internal/pulseaudio
format-volume = <label-volume>
format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.purple}
label-volume = %percentage%%
label-volume-foreground = ${colors.fg-dim}
format-muted = <label-muted>
format-muted-prefix = "VOL "
format-muted-prefix-foreground = ${colors.fg-dim}
label-muted = stumm
label-muted-foreground = ${colors.fg-dim}

; ============================================================
;   Batterie
; ============================================================
[module/battery]
type = internal/battery
battery = BAT1
adapter = ACAD
poll-interval = 5
full-at = 99
low-at = 15
format-charging    = <label-charging>
format-charging-prefix = "BAT "
format-charging-prefix-foreground = ${colors.green}
format-discharging = <label-discharging>
format-discharging-prefix = "BAT "
format-discharging-prefix-foreground = ${colors.purple}
format-full = <label-full>
format-full-prefix = "BAT "
format-full-prefix-foreground = ${colors.green}
format-low = <label-low>
format-low-prefix = "BAT "
format-low-prefix-foreground = ${colors.orange}
label-charging     = %percentage%% ↑
label-discharging  = %percentage%%
label-full         = voll
label-low          = %percentage%% !
label-charging-foreground    = ${colors.fg-dim}
label-discharging-foreground = ${colors.fg-dim}
label-full-foreground        = ${colors.fg-dim}
label-low-foreground         = ${colors.orange}

; ============================================================
;   Helligkeit
; ============================================================
[module/backlight]
type = internal/backlight
card = intel_backlight
use-actual-brightness = true
enable-scroll = true
format = <label>
format-prefix = "BRT "
format-prefix-foreground = ${colors.purple}
label = %percentage%%
label-foreground = ${colors.fg-dim}
