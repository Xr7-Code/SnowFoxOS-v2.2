# ============================================================
#   SnowFoxOS — Picom Configuration (SnowFox Palette)
# ============================================================

#################################
#           Backend             #
#################################
backend = "glx";
glx-no-stencil = true;
glx-no-rebind-pixmap = true;
glx-copy-from-front = false;
use-damage = true;
vsync = true;
unredir-if-possible = true;

#################################
#           Shadows             #
#################################
shadow = true;
shadow-radius = 10;
shadow-offset-x = -10;
shadow-offset-y = -10;
shadow-opacity = 0.4;
shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'Conky'",
  "class_g ?= 'Notify-osd'",
  "class_g = 'Cairo-clock'",
  "_GTK_FRAME_EXTENTS@:c"
];

#################################
#           Fading              #
#################################
fading = false;

#################################
#           Corners             #
#################################
corner-radius = 5; # Konsistent 5px für abgerundete Ecken wie in Rofi & Canva

rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

#################################
#           Wintypes            #
#################################
wintypes:
{
  tooltip      = { fade = false; shadow = true; opacity = 0.9; focus = true; }
  dock         = { shadow = false; }
  utility      = { shadow = false; }
  toolbar      = { shadow = false; }
  popup_menu   = { opacity = 1.0; shadow = true; }
  dropdown_menu = { opacity = 1.0; shadow = true; }
  dnd          = { shadow = false; }
};
